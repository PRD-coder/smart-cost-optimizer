apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-cost-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: smart-cost-app

  template:
    metadata:
      labels:
        app: smart-cost-app

    spec:
      containers:
      - name: smart-cost-app

        image: smart-cost-app

        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "200m"
            memory: "256Mi"